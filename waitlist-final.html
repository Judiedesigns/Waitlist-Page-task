<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Even — Join the Waitlist</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Figtree:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563EB;--blue-b:#3B82F6;--blue-g:#60A5FA;
  --glow:rgba(59,130,246,.35);--glow-b:rgba(59,130,246,.12);
  --white:#FFFFFF;--off:#E2E8F0;--muted:#64748B;
  --bg:#040812;--bg-2:#070D1A;--surface:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.07);
}

html,body{
  min-height:100vh;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-family:'Figtree',sans-serif;color:#f0f0f0;
  overflow-x:hidden;
}

/* ── BACKGROUND ── */
.bg-layer{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(37,99,235,.18) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(59,130,246,.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 20% 70%, rgba(96,165,250,.06) 0%, transparent 55%);
}

/* grid lines */
.bg-grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
}

/* Orb */
.orb{
  position:fixed;top:-20%;left:50%;transform:translateX(-50%);
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle, rgba(37,99,235,.22) 0%, transparent 70%);
  filter:blur(60px);z-index:0;
  animation:orbPulse 6s ease-in-out infinite;
}
@keyframes orbPulse{
  0%,100%{transform:translateX(-50%) scale(1);opacity:.8}
  50%{transform:translateX(-50%) scale(1.1);opacity:1}
}

/* ── MAIN ── */
.main{
  position:relative;z-index:2;
  width:100%;max-width:640px;
  padding:2rem;
  text-align:center;
}

/* Badge */
.badge{
  display:inline-flex;align-items:center;gap:.5rem;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:100px;
  padding:.4rem 1rem;
  margin-bottom:2.5rem;
  backdrop-filter:blur(8px);
}
.badge-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--blue-b);
  box-shadow:0 0 8px var(--blue-b);
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.badge-text{
  font-family:'DM Mono',monospace;
  font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--blue-g);
}

/* Headline */
.headline{max-width:700px;margin-left:auto;margin-right:auto;text-wrap:balance;
  font-size:clamp(2.5rem,5.5vw,64px);
  font-weight:400;line-height:1;
  letter-spacing:-2.5px;
  margin-bottom:1.5rem;
  font-family:'Figtree',sans-serif;
}
.headline span{
  color:#f0f0f0;
}

/* Subtext */
.sub{
  font-family:'DM Mono',monospace;
  font-size:.78rem;line-height:1.8;letter-spacing:.04em;
  color:var(--muted);max-width:420px;margin:0 auto 3rem;
}

/* Counter */
.counter-wrap{
  display:inline-flex;align-items:center;gap:.6rem;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;padding:.6rem 1.2rem;
  margin-bottom:2.5rem;
  backdrop-filter:blur(8px);
}
.counter-avatars{
  display:flex;
}
.avatar{
  width:24px;height:24px;border-radius:50%;
  border:1.5px solid var(--bg);
  background:linear-gradient(135deg,var(--blue),var(--blue-g));
  margin-left:-6px;font-size:.55rem;
  display:flex;align-items:center;justify-content:center;
  color:white;font-weight:700;
}
.avatar:first-child{margin-left:0}
.avatar:nth-child(2){background:linear-gradient(135deg,#7C3AED,#A78BFA)}
.avatar:nth-child(3){background:linear-gradient(135deg,#0D9488,#34D399)}
.counter-text{
  font-family:'DM Mono',monospace;
  font-size:.62rem;letter-spacing:.06em;color:var(--off);
}
.counter-text strong{
  color:var(--blue-g);font-weight:400;
}
#counter-num{
  display:inline-block;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .2s;
}
#counter-num.bump{
  animation:bump .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes bump{
  0%{transform:translateY(0) scale(1)}
  40%{transform:translateY(-6px) scale(1.2)}
  100%{transform:translateY(0) scale(1)}
}

/* Form */
.form{
  display:flex;gap:.6rem;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;padding:.5rem .5rem .5rem .5rem;
  backdrop-filter:blur(12px);
  transition:border-color .25s,box-shadow .25s;
  margin-bottom:1rem;
}
.form:focus-within{
  border-color:rgba(59,130,246,.4);
  box-shadow:0 0 0 4px rgba(59,130,246,.08),0 0 30px rgba(59,130,246,.12);
}
.form input{
  flex:1;background:none;border:none;outline:none;
  font-family:'Figtree',sans-serif;font-size:.92rem;font-weight:400;
  color:var(--white);padding:.55rem .75rem;
  caret-color:var(--blue-b);
}
.form input::placeholder{color:var(--muted)}
.form button{
  background:linear-gradient(135deg,var(--blue),var(--blue-b));
  border:none;border-radius:10px;
  font-family:'Figtree',sans-serif;font-size:.88rem;font-weight:700;
  color:white;padding:.6rem 1.5rem;cursor:pointer;
  white-space:nowrap;
  box-shadow:0 4px 20px rgba(37,99,235,.4);
  transition:box-shadow .2s,transform .15s,filter .2s;
}
.form button:hover{
  box-shadow:0 6px 28px rgba(37,99,235,.55);
  transform:translateY(-1px);filter:brightness(1.1);
}
.form button:active{transform:translateY(0)}

/* Error / success inline */
.form-msg{
  font-family:'DM Mono',monospace;
  font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;
  height:1rem;transition:opacity .25s;opacity:0;
  margin-bottom:2.5rem;
}
.form-msg.visible{opacity:1}
.form-msg.err{color:#F87171}
.form-msg.ok{color:var(--blue-g)}

/* Social proof line */
.proof{
  font-family:'DM Mono',monospace;
  font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);
}
.proof span{color:rgba(255,255,255,.3);margin:0 .4rem}



/* ── Particles ── */
#particles{
  position:fixed;inset:0;z-index:1;pointer-events:none;
}

/* ── Load animations ── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes popIn{
  from{opacity:0;transform:scale(.85)}
  to{opacity:1;transform:scale(1)}
}

.badge{
  opacity:0;
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1) .1s forwards;
}
.headline{
  opacity:0;
  animation:fadeUp .7s cubic-bezier(.16,1,.3,1) .35s forwards;
}
.sub{
  opacity:0;
  animation:fadeUp .7s cubic-bezier(.16,1,.3,1) .55s forwards;
}
.counter-wrap{
  opacity:0;
  animation:fadeUp .7s cubic-bezier(.16,1,.3,1) .72s forwards;
}
.form{
  opacity:0;
  animation:fadeUp .7s cubic-bezier(.16,1,.3,1) .88s forwards;
}
.form-msg{
  opacity:0;
  animation:fadeUp .7s cubic-bezier(.16,1,.3,1) 1s forwards;
}
.proof{
  opacity:0;
  animation:fadeUp .7s cubic-bezier(.16,1,.3,1) 1.05s forwards;
}

/* ── Mobile responsive ── */
@media(max-width:600px){
  .form{
    flex-direction:column;
    border-radius:16px;
    padding:.6rem;
    gap:.5rem;
  }
  .form input{
    width:100%;
    padding:.75rem 1rem;
    border-radius:10px;
    background:rgba(255,255,255,.05);
  }
  .form button{
    width:100%;
    padding:.85rem 1.5rem;
    border-radius:10px;
    text-align:center;
  }
  .counter-wrap{
    flex-direction:column;
    gap:.4rem;
    text-align:center;
  }
  .main{
    padding:1.25rem;
  }
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>
<canvas id="particles"></canvas>
<div class="orb"></div>

<div class="main">

  <div class="badge">
    <div class="badge-dot"></div>
    <span class="badge-text">Now accepting early access</span>
  </div>

  <h1 class="headline">
    The smarter way to manage <span>your money</span>
  </h1>

  <p class="sub">
    Even brings your spending, savings, and bills together so you always know where you stand.
  </p>

  <div class="counter-wrap">
    <div class="counter-avatars">
      <div class="avatar">A</div>
      <div class="avatar">J</div>
      <div class="avatar">+</div>
    </div>
    <div class="counter-text">
      <strong><span id="counter-num">2,847</span></strong> people already waiting
    </div>
  </div>

  <div class="form" id="form-wrap">
    <input type="email" id="email-input" placeholder="Enter your email address" autocomplete="email"/>
    <button id="submit-btn">Join waitlist</button>
  </div>

  <div class="form-msg" id="form-msg"></div>

  <div class="proof">
    No spam <span>·</span> No credit card <span>·</span> Cancel anytime
  </div>

</div>

<script>
// ── Counter ──
let count = 2847;
const counterEl = document.getElementById('counter-num');
function formatNum(n){ return n.toLocaleString(); }
counterEl.textContent = formatNum(count);

function bumpCounter(){
  count++;
  counterEl.classList.remove('bump');
  void counterEl.offsetWidth;
  counterEl.classList.add('bump');
  counterEl.textContent = formatNum(count);
}

// ── Form ──
const emailInput = document.getElementById('email-input');
const submitBtn  = document.getElementById('submit-btn');
const formMsg    = document.getElementById('form-msg');
const submitted  = new Set();

function showMsg(text, type){
  formMsg.textContent = text;
  formMsg.className = 'form-msg visible ' + type;
  setTimeout(()=>{ formMsg.classList.remove('visible'); }, 3500);
}

submitBtn.addEventListener('click', handleSubmit);
emailInput.addEventListener('keydown', e => { if(e.key==='Enter') handleSubmit(); });

function handleSubmit(){
  const email = emailInput.value.trim();

  // Validate
  if(!email){
    showMsg('Please enter your email address.', 'err');
    return;
  }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    showMsg('That doesn\'t look like a valid email.', 'err');
    return;
  }
  if(submitted.has(email)){
    showMsg('You\'re already on the list!', 'err');
    return;
  }

  // Success
  submitted.add(email);
  emailInput.value = '';
  submitBtn.textContent = '✓ You\'re in!';
  submitBtn.style.background = 'linear-gradient(135deg,#0D9488,#34D399)';
  submitBtn.style.boxShadow  = '0 4px 20px rgba(13,148,136,.4)';
  showMsg('Welcome to the waitlist — we\'ll be in touch.', 'ok');
  bumpCounter();
  launchConfetti();

  setTimeout(()=>{
    submitBtn.textContent = 'Join waitlist';
    submitBtn.style.background = '';
    submitBtn.style.boxShadow  = '';
  }, 3000);
}

// ── Confetti (canvas-confetti library) ──
const confettiOptions = {
  particleCount: 150,
  spread: 90,
  origin: { y: 0.6 },
  colors: ['#3B82F6','#60A5FA','#93C5FD','#DBEAFE','#7C3AED','#A78BFA','#34D399','#FFFFFF','#FCD34D'],
  ticks: 150,
  gravity: 1.8,
  scalar: 1.1,
  shapes: ['square', 'circle'],
};

function launchConfetti(options = {}){
  const merged = { ...confettiOptions, ...options };
  confetti(merged);
}

// ── Floating particles ──
const pCanvas = document.getElementById('particles');
const pCtx    = pCanvas.getContext('2d');
let dots      = [];

function resizeParticles(){
  pCanvas.width  = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resizeParticles(); initDots(); });
resizeParticles();

function initDots(){
  dots = [];
  const count = Math.floor((pCanvas.width * pCanvas.height) / 14000);
  for(let i = 0; i < count; i++){
    dots.push({
      x:      Math.random() * pCanvas.width,
      y:      Math.random() * pCanvas.height,
      r:      Math.random() * 1.5 + 0.4,
      vx:     (Math.random() - 0.5) * 0.25,
      vy:     (Math.random() - 0.5) * 0.25,
      alpha:  Math.random() * 0.4 + 0.1,
    });
  }
}
initDots();

function animateParticles(){
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  dots.forEach(d => {
    d.x += d.vx;
    d.y += d.vy;
    // wrap around edges
    if(d.x < 0)              d.x = pCanvas.width;
    if(d.x > pCanvas.width)  d.x = 0;
    if(d.y < 0)              d.y = pCanvas.height;
    if(d.y > pCanvas.height) d.y = 0;

    pCtx.beginPath();
    pCtx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    pCtx.fillStyle = `rgba(147,197,253,${d.alpha})`;
    pCtx.fill();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

</script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</body>
</html>
